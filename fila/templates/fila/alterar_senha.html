{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Alterar Senha - AeroRiver</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; color: #334155; }
        .card-aero { border: none; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); }
        .btn-aero-primary { background: linear-gradient(135deg, #2A9D8F 0%, #21867a 100%); color: white; font-weight: 600; border: none; border-radius: 10px; padding: 0.9rem; transition: all 0.3s ease; }
        .btn-aero-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(42, 157, 143, 0.3); color: white; }
        .form-control { border-radius: 8px; border: 1px solid #E2E8F0; padding: 0.6rem 1rem; }
        .form-control:focus { border-color: #2A9D8F; box-shadow: 0 0 0 0.25rem rgba(42, 157, 143, 0.15); }
        form p { margin-bottom: 1.2rem; font-weight: 500; }
        ul.errorlist { color: #DC2626; background: #FEF2F2; padding: 10px; border-radius: 8px; list-style: none; font-size: 0.9rem; margin-bottom: 15px; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
    <div class="container" style="max-width: 500px;">
        <div class="card card-aero p-4 p-md-5">
            <h4 class="mb-4 fw-bold text-center" style="color: #2A9D8F;">🔐 Alterar Minha Senha</h4>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn btn-aero-primary flex-grow-1">Salvar Nova Senha</button>
                    <a href="{% url 'lista_fila' %}" class="btn btn-light" style="border-radius: 10px; font-weight: 600; color: #64748B; border: 1px solid #E2E8F0; display:flex; align-items:center; padding: 0 1.5rem; text-decoration: none;">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
