<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Senha Alterada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container text-center" style="max-width: 400px;">
        <div class="card p-4 shadow-sm">
            <h4 class="mb-3 text-success">Senha alterada com sucesso!</h4>
            <p class="text-muted">Sua senha foi redefinida. Agora você já pode acessar o sistema novamente com a sua nova senha.</p>
            <a href="{% url 'login' %}" class="btn btn-primary mt-3">Fazer Login</a>
        </div>
    </div>
</body>
</html>
