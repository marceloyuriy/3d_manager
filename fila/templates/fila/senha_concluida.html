{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sucesso - AeroRiver</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .card-aero { border: none; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); }
        .btn-aero { background: #2A9D8F; color: white; border: none; font-weight: 600; border-radius: 10px; padding: 12px; transition: all 0.2s; }
        .btn-aero:hover { background: #21867a; color: white; transform: scale(1.02); }
    </style>
</head>
<body class="d-flex align-items-center vh-100">
    <div class="container text-center" style="max-width: 420px;">
        <div class="card card-aero p-5">
            <div style="font-size: 3.5rem;" class="mb-3">✅</div>
            <h4 class="fw-bold mb-3" style="color: #2A9D8F;">Tudo pronto!</h4>
            <p class="text-muted">Sua senha foi alterada com sucesso. Você já pode acessar o sistema com suas novas credenciais.</p>
            <a href="{% url 'login' %}" class="btn btn-aero mt-4 w-100 text-decoration-none">Ir para o Login</a>
        </div>
    </div>
</body>
</html>
