<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>E-mail Enviado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container text-center" style="max-width: 500px;">
        <div class="card p-4 shadow-sm">
            <h4 class="mb-3 text-success">Verifique seu e-mail</h4>
            <p class="text-muted">Nós enviamos um e-mail com instruções para redefinir sua senha. Se existir uma conta com o e-mail que você digitou, você o receberá em instantes.</p>
            <p class="text-muted small">Se não receber o e-mail, verifique sua caixa de spam.</p>
            <a href="{% url 'login' %}" class="btn btn-outline-primary mt-3">Voltar ao Login</a>
        </div>
    </div>
</body>
</html>
