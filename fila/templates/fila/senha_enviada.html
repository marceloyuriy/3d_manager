{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>E-mail Enviado - AeroRiver</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .card-aero { border: none; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); }
        .btn-outline-aero { color: #2A9D8F; border: 2px solid #2A9D8F; font-weight: 600; border-radius: 10px; padding: 10px; transition: all 0.2s; }
        .btn-outline-aero:hover { background: #2A9D8F; color: white; }
    </style>
</head>
<body class="d-flex align-items-center vh-100">
    <div class="container text-center" style="max-width: 500px;">
        <div class="card card-aero p-5">
            <div style="font-size: 3rem;" class="mb-3">📩</div>
            <h4 class="fw-bold mb-3" style="color: #2A9D8F;">Verifique seu e-mail</h4>
            <p class="text-muted">Enviamos as instruções para redefinir sua senha. Caso não receba em alguns minutos, verifique sua caixa de spam.</p>
            <a href="{% url 'login' %}" class="btn btn-outline-aero mt-4 w-100 text-decoration-none">Voltar ao Login</a>
        </div>
    </div>
</body>
</html>
