<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Senha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container" style="max-width: 400px;">
        <div class="card p-4 shadow-sm">
            <h4 class="mb-3 text-center">Esqueceu a senha?</h4>
            <p class="text-muted small">Digite seu endereço de e-mail (caso tenha cadastrado um) e enviaremos instruções para criar uma nova senha.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100">Enviar e-mail</button>
                <a href="{% url 'login' %}" class="btn btn-link w-100 text-center mt-2">Cancelar</a>
            </form>
        </div>
    </div>
</body>
</html>
