{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acesso - AeroRiver 3D</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --aero-logo-dark: #334155;
            --aero-logo-green: #2A9D8F;
            --aero-accent-blue: #00B4D8;
            --bg-color: #F8FAFC;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .auth-card {
            background: #ffffff;
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.03);
            width: 100%;
            max-width: 420px;
            padding: 3rem 2.5rem;
            text-align: center;
        }
        .btn-aero-primary {
            background: linear-gradient(135deg, var(--aero-accent-blue) 0%, #0394D2 100%);
            color: white;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            padding: 0.8rem;
            transition: all 0.3s ease;
        }
        .btn-aero-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 180, 216, 0.3);
            color: white;
        }
        .form-control {
            border-radius: 8px;
            padding: 0.6rem 1rem;
            border-color: #E2E8F0;
        }
        .form-control:focus {
            border-color: var(--aero-accent-blue);
            box-shadow: 0 0 0 0.25rem rgba(0, 180, 216, 0.15);
        }
        .auth-links a {
            color: var(--aero-logo-dark);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .auth-links a:hover { color: var(--aero-accent-blue); }
    </style>
</head>
<body>
    <div class="auth-card">
        <img src="{% static 'img/Logo.png' %}" alt="Logo AeroRiver" height="60" class="mb-4" style="object-fit: contain;">

        <p class="text-muted mb-4 small">Acesso ao Hub de Manufatura Aditiva</p>

        <form method="post" class="text-start">
            {% csrf_token %}

            {% if form.errors %}
                <div class="alert alert-danger p-2 small text-center" style="border-radius: 8px;">Utilizador ou palavra-passe incorretos.</div>
            {% endif %}

            <div class="mb-3">
                {{ form.as_p }}
            </div>

            <button type="submit" class="btn btn-aero-primary w-100 mb-3 mt-2">Acessar o Sistema</button>

            <div class="d-flex justify-content-between auth-links small mt-3">
                <a href="{% url 'password_reset' %}">Esqueci a palavra-passe</a>
                <a href="{% url 'registro' %}" style="color: var(--aero-logo-green);">Criar uma conta</a>
            </div>

            <hr class="my-4" style="border-color: #E2E8F0;">
            <a href="{% url 'lista_fila' %}" class="btn btn-light w-100" style="border-radius: 10px; font-weight: 600; color: #64748B; border: 1px solid #E2E8F0;">Voltar para a Fila</a>
        </form>
    </div>
</body>
</html>
