{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acesso Restrito - AeroRiver Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #334155;
        }
        .login-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        .aero-title {
            font-weight: 700;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.5rem;
        }
        .aero-title span { color: #2A9D8F; } /* Verde AeroRiver */

        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #64748B;
        }
        .form-control {
            border-radius: 8px;
            padding: 0.8rem 1rem;
            border: 1px solid #E2E8F0;
            background-color: #F8FAFC;
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: #2A9D8F;
            background-color: #FFFFFF;
            box-shadow: 0 0 0 0.25rem rgba(42, 157, 143, 0.15);
        }

        .btn-aero-green {
            background: linear-gradient(135deg, #2A9D8F 0%, #21867a 100%);
            color: white;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            padding: 0.9rem;
            width: 100%;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .btn-aero-green:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(42, 157, 143, 0.3);
            color: white;
        }

        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #94A3B8;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .forgot-link:hover { color: #2A9D8F; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="aero-title">✈️ <span>AeroRiver</span> Hub</div>

        <form method="post">
            {% csrf_token %}
            {% if form.errors %}
                <div class="alert alert-danger" style="font-size: 0.85rem; border-radius: 8px; border:none; background-color: #FEF2F2; color:#DC2626;">
                    <strong>Erro:</strong> Usuário ou senha incorretos.
                </div>
            {% endif %}

            <div class="mb-3">
                <label class="form-label">USUÁRIO</label>
                <input type="text" name="username" class="form-control" required autofocus placeholder="Digite o seu login">
            </div>

            <div class="mb-4">
                <label class="form-label">SENHA</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-aero-green">Acessar Sistema</button>
        </form>

        <a href="{% url 'password_reset' %}" class="forgot-link">Esqueci a minha palavra-passe</a>
    </div>
</body>
</html>
