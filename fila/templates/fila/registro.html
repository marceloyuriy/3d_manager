<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Conta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container text-center" style="max-width: 450px;">
        <h2 class="mb-4">Novo Usuário</h2>
        <form method="post" class="card p-4 shadow-sm text-start">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success w-100 mt-3">Cadastrar</button>
            <a href="{% url 'login' %}" class="btn btn-link w-100 mt-2 text-center">Já tenho uma conta</a>
        </form>
    </div>
</body>
</html>
