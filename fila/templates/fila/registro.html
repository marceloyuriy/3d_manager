{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nova Conta - AeroRiver</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --aero-logo-dark: #334155;
            --aero-logo-green: #2A9D8F;
            --aero-accent-blue: #00B4D8;
            --bg-color: #F8FAFC;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 0;
        }
        .auth-card {
            background: #ffffff;
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.03);
            width: 100%;
            max-width: 480px;
            padding: 3rem 2.5rem;
        }
        .btn-aero-primary {
            background: linear-gradient(135deg, var(--aero-accent-blue) 0%, #0394D2 100%);
            color: white;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            padding: 0.8rem;
            transition: all 0.3s ease;
        }
        .btn-aero-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 180, 216, 0.3); color: white; }
        .form-control { border-radius: 8px; padding: 0.5rem 0.8rem; border-color: #E2E8F0; }
        .form-control:focus { border-color: var(--aero-accent-blue); box-shadow: 0 0 0 0.25rem rgba(0, 180, 216, 0.15); }
        .helptext { font-size: 0.75rem; color: #94A3B8; display: block; margin-top: 4px; }
        ul.errorlist { color: #DC2626; font-size: 0.8rem; padding-left: 1rem; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="text-center mb-4">
            <img src="{% static 'img/Logo.png' %}" alt="Logo AeroRiver" height="45" style="object-fit: contain;">
        </div>

        <h5 class="fw-bold mb-4 text-center" style="color: var(--aero-logo-dark);">Criar Conta de Operador</h5>

        <form method="post">
            {% csrf_token %}

            <div class="mb-2">
                {{ form.as_p }}
            </div>

            <button type="submit" class="btn btn-aero-primary w-100 mt-4 mb-3">Concluir Registo</button>

            <div class="text-center small">
                <span class="text-muted">Já faz parte da equipa?</span>
                <a href="{% url 'login' %}" style="color: var(--aero-logo-green); font-weight: 600; text-decoration: none;">Faça o Login</a>
            </div>
        </form>
    </div>
</body>
</html>
