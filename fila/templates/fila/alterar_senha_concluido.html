{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Senha Alterada - AeroRiver</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .card-aero { border: none; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); }
        .btn-aero-primary { background: linear-gradient(135deg, #2A9D8F 0%, #21867a 100%); color: white; font-weight: 600; border: none; border-radius: 10px; padding: 0.9rem; transition: all 0.3s ease; }
        .btn-aero-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(42, 157, 143, 0.3); color: white; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
    <div class="container text-center" style="max-width: 450px;">
        <div class="card card-aero p-5">
            <div style="font-size: 3.5rem;" class="mb-3">✅</div>
            <h4 class="fw-bold mb-3" style="color: #2A9D8F;">Senha atualizada!</h4>
            <p class="text-muted mb-4">Sua senha foi alterada com sucesso. A partir de agora, use a nova senha para entrar no Hub.</p>
            <a href="{% url 'lista_fila' %}" class="btn btn-aero-primary text-decoration-none">Voltar ao Hub de Manufatura</a>
        </div>
    </div>
</body>
</html>
