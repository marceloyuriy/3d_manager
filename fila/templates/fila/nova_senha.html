<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Nova Senha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container" style="max-width: 450px;">
        <div class="card p-4 shadow-sm">
            <h4 class="mb-3 text-center">Digite a nova senha</h4>

            {% if validlink %}
                <p class="text-muted small text-center">Por favor, digite sua nova senha duas vezes para confirmar.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100 mt-2">Salvar nova senha</button>
                </form>
            {% else %}
                <div class="alert alert-danger text-center">
                    O link de redefinição de senha é inválido ou já expirou. Por favor, solicite uma nova redefinição.
                </div>
                <a href="{% url 'password_reset' %}" class="btn btn-primary w-100 mt-2">Solicitar novo link</a>
            {% endif %}

        </div>
    </div>
</body>
</html>
