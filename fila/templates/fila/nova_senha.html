{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nova Senha - AeroRiver</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .card-aero { border: none; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); }
        .btn-aero { background: #2A9D8F; color: white; border: none; font-weight: 600; border-radius: 10px; padding: 12px; }
        .btn-aero:hover { background: #21867a; color: white; }
    </style>
</head>
<body class="d-flex align-items-center vh-100">
    <div class="container" style="max-width: 450px;">
        <div class="card card-aero p-5 shadow-sm">
            <h4 class="mb-4 fw-bold text-center" style="color: #2A9D8F;">Definir Nova Senha</h4>

            {% if validlink %}
                <p class="text-muted small text-center mb-4">Insira sua nova senha abaixo para recuperar o acesso.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.as_p }}
                    </div>
                    <button type="submit" class="btn btn-aero w-100 mt-3">Salvar Nova Senha</button>
                </form>
            {% else %}
                <div class="alert alert-danger border-0 text-center" style="background-color: #FEF2F2; color: #DC2626; border-radius: 10px;">
                    O link de redefinição expirou ou é inválido.
                </div>
                <a href="{% url 'password_reset' %}" class="btn btn-outline-secondary w-100 mt-2" style="border-radius: 10px;">Solicitar novo link</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
